services:
  dashboard:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - STARTING_BALANCE=200
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  bot:
    build: .
    command: python main.py
    environment:
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      - dashboard
